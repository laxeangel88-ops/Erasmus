<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erasmus+ Feed | IES Aljada</title>
  <link rel="stylesheet" href="style.css">
  <link rel="alternate" type="application/rss+xml"
        title="Erasmus+ IES Aljada" href="erasmus.xml">
</head>
<body>
 <header>
  <div class="header-content">
    <div class="header-eyebrow">Noticias en tiempo real</div>
    <h1>Erasmus+ <em>Feed</em></h1>
    <p class="subtitle">Noticias en directo de nuestros alumnos en Europa</p>
  </div>
  <svg class="header-wave" viewBox="0 0 1440 50" preserveAspectRatio="none" fill="#FAFAF7">
    <path d="M0,50 C360,0 1080,0 1440,50 L1440,50 L0,50 Z"/>
  </svg>
</header>
  <main>
    <section class="filtros" aria-label="Filtrar noticias">

      <button class="filtro-btn activo" data-fuente="todos" data-cat="todos">
        🌐 Todos
      </button>

      <div class="dropdown">
        <button class="dropdown-btn">🏫 IES Aljada ⮞</button>
        <div class="dropdown-menu">
          <button class="filtro-btn" data-fuente="aljada" data-cat="todos">Todas</button>
          <button class="filtro-btn" data-fuente="aljada" data-cat="actividades">Actividades</button>
          <button class="filtro-btn" data-fuente="aljada" data-cat="alumnos">Alumnos</button>
          <button class="filtro-btn" data-fuente="aljada" data-cat="noticias">Noticias</button>
          <button class="filtro-btn" data-fuente="aljada" data-cat="familias">Familias</button>
        </div>
      </div>

      <div class="dropdown">
        <button class="dropdown-btn">🏫 IES Jose Planes ⮞</button>
        <div class="dropdown-menu">
          <button class="filtro-btn" data-fuente="joseplanes" data-cat="todos">Todas</button>
          <button class="filtro-btn" data-fuente="joseplanes" data-cat="tablón de anuncios">Tablón de anuncios</button>
          <button class="filtro-btn" data-fuente="joseplanes" data-cat="extraescolares">Extraescolares</button>
          <button class="filtro-btn" data-fuente="joseplanes" data-cat="dpto_farmacia">Dpto_Farmacia</button>
        </div>
      </div>

    </section>
    <section id="feed" class="feed-grid" aria-live="polite">
      <p class="cargando">Cargando noticias Erasmus+...</p>
    </section>
  </main>
  <footer>
    <p>IES Aljada &bull; Programa Erasmus+ &bull;
      <a href="erasmus.xml">Ver feed RSS</a>
    </p>
  </footer>
  <script src="app.js"></script>
</body>
</html>
