<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erasmus+ Feed | IES Aljada</title>
  <link rel="stylesheet" href="style.css">
  <!-- Enlace al feed RSS (importante para SEO y lectores RSS) -->
  <link rel="alternate" type="application/rss+xml"
        title="Erasmus+ IES Aljada" href="erasmus.xml">
</head>
<body>

  <header>
    <div class="header-content">
      <h1>📡 Erasmus+ Feed</h1>
      <p class="subtitle">Noticias en directo de nuestros alumnos en Europa</p>
    </div>
  </header>

  <main>
    <!-- Zona de filtros por país -->
    <section class="filtros" aria-label="Filtrar por país">
      <button class="filtro-btn activo" data-cat="todos">Todos</button>
      <button class="filtro-btn" data-cat="Alemania">🇩🇪 Alemania</button>
      <button class="filtro-btn" data-cat="Países Bajos">🇳🇱 Países Bajos</button>
      <button class="filtro-btn" data-cat="Portugal">🇵🇹 Portugal</button>
    </section>

    <!-- Aquí app.js inyecta las tarjetas de noticias -->
    <section id="feed" class="feed-grid" aria-live="polite">
      <p class="cargando">Cargando noticias Erasmus+...</p>
    </section>
  </main>

  <footer>
    <p>IES Aljada &bull; Programa Erasmus+ &bull;
      <a href="erasmus.xml">Ver feed RSS</a>
    </p>
  </footer>
  <script src="app.js"></script>
</body>
</html>
